<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <title>IsOnline</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #16a34a;
        --warn: #d97706;
        --bad: #dc2626;
        --border: rgba(15, 23, 42, 0.10);
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: min(360px, 100%);
        background: color-mix(in oklab, var(--card) 92%, transparent);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 14px 40px rgba(15,23,42,0.12);
      }
      h1 {
        font-size: 36px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      button {
        appearance: none;
        border: 1px solid transparent;
        background: color-mix(in oklab, var(--card) 80%, #111827);
        color: var(--text);
        padding: 10px 12px;
        border-radius: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 72px;
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .pill {
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 12px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
      }
      .icon {
        width: 36px;
        height: 36px;
        fill: currentColor;
      }
      .btn-icon {
        width: 54px;
        height: 54px;
      }
      .spin { animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .ok { color: var(--accent); }
      .warn { color: var(--warn); }
      .bad { color: var(--bad); }
      .list {
        margin-top: 8px;
        display: grid;
        gap: 1px;
      }
      .item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 4px;
        align-items: center;
        padding: 6px 8px;
        border-radius: 14px;
        border: 1px solid transparent;
        background: color-mix(in oklab, var(--card) 84%, transparent);
      }
      .name {
        font-weight: 700;
        font-size: 26px;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>IsOnline</h1>

      <section class="list" id="serviceList" aria-label="Services">
        <div class="item" data-service="yandex">
          <div>
            <div class="name">Yandex</div>
          </div>
          <span class="pill" aria-label="Status" title="Status">
            <span class="status-icon" aria-hidden="true"></span>
          </span>
        </div>

        <div class="item" data-service="google">
          <div>
            <div class="name">Google</div>
          </div>
          <span class="pill" aria-label="Status" title="Status">
            <span class="status-icon" aria-hidden="true"></span>
          </span>
        </div>

        <div class="item" data-service="telegram">
          <div>
            <div class="name">Telegram</div>
          </div>
          <span class="pill" aria-label="Status" title="Status">
            <span class="status-icon" aria-hidden="true"></span>
          </span>
        </div>

        <div class="item" data-service="youtube">
          <div>
            <div class="name">YouTube</div>
          </div>
          <span class="pill" aria-label="Status" title="Status">
            <span class="status-icon" aria-hidden="true"></span>
          </span>
        </div>
      </section>

      <div class="row" style="margin-top: 8px;">
        <button id="checkBtn" type="button" aria-label="Check all services" title="Check all services">
          <svg class="icon btn-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M17.65 6.35A7.95 7.95 0 0 0 12 4V1L7 6l5 5V7c2.76 0 5 2.24 5 5 0 1.57-.73 2.97-1.87 3.89l1.42 1.42A7 7 0 0 0 19 12c0-2.21-.9-4.21-2.35-5.65zM6 12c0-1.57.73-2.97 1.87-3.89L6.45 6.69A7 7 0 0 0 5 12c0 2.21.9 4.21 2.35 5.65A7.95 7.95 0 0 0 12 20v3l5-5-5-5v3c-2.76 0-5-2.24-5-5z"/>
          </svg>
        </button>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
